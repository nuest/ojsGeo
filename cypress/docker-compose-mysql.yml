networks:
  inside:

services: 

    db:
        image: mariadb:10.2
        env_file:
            - .env
        container_name: "${OJS_DB_HOST}"
        environment:
            MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
            MYSQL_DATABASE: "${MYSQL_DATABASE}"
            MYSQL_USER: "${MYSQL_USER}"
            MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
        restart: always
        # Expose mariadb on host port 3307 so the cypress runner (on the host)
        # can connect via mysql2 for the second-journal DB-write helper (#99).
        # 3307 not 3306 to avoid colliding with native mysql on the dev laptop.
        ports:
            - "3307:3306"
        networks:
            - inside
    
    ojs:
        image: "pkpofficial/ojs:${OJS_VERSION}"
        container_name: ojs
        # The php8.1-mod tag ships with USER=www-data, but the entrypoint
        # script (`/usr/local/bin/pkp-start`) runs sed on /etc/apache2/* which
        # only root can write. Override back to root; Apache itself drops to
        # www-data once it has bound port 80.
        user: root
        # The php8.1-mod image has only the C/POSIX glibc locale installed, so
        # OJS's PKPLocale::initialize() setlocale(LC_ALL, "en_US.UTF-8", "en_US")
        # silently fails and PHP's locale stays "C". The php81_bc/strftime
        # shim then passes "C" to IntlDateFormatter, which ICU rejects with
        # "Found unconstructed IntlDateFormatter" — taking out every grid that
        # renders a file date (FileDateGridColumn) and breaking the editorial
        # workflow's file-selection step. Generate en_US.UTF-8 at container
        # start (idempotent across restarts).
        command:
            - sh
            - -c
            - |
              if ! locale -a 2>/dev/null | grep -q '^en_US.utf8$'; then
                apt-get update -qq >/dev/null && \
                DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends locales >/dev/null && \
                sed -i 's/^# *en_US.UTF-8 UTF-8/en_US.UTF-8 UTF-8/' /etc/locale.gen && \
                locale-gen >/dev/null
              fi
              exec "$$PKP_CMD"
        env_file:
            - .env
        restart: always
        ports:
            - "${OJS_PORT:-8080}:80"
        volumes:
            - ./logs:/var/log/apache2
            - ../:/var/www/html/plugins/generic/geoMetadata
            # Patches the stock issue_toc.tpl (which lacks the Templates::Issue::TOC::Main
            # hook) so the plugin's issue map section renders. File name carries the
            # OJS_VERSION; update/add a sibling file when bumping to a different image.
            - ./ojs-patches/issue_toc-3_3_0-16-php8.1.tpl:/var/www/html/templates/frontend/objects/issue_toc.tpl:ro
        depends_on:
            - db
        networks:
            - inside
